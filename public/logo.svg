<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" fill="none">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#4f46e5"/>
      <stop offset="100%" stop-color="#7c3aed"/>
    </linearGradient>
    <linearGradient id="shine" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="rgba(255,255,255,0.15)"/>
      <stop offset="100%" stop-color="rgba(255,255,255,0)"/>
    </linearGradient>
  </defs>

  <!-- Rounded square background -->
  <rect width="512" height="512" rx="108" fill="url(#bg)"/>
  <rect width="512" height="512" rx="108" fill="url(#shine)"/>

  <!-- Envelope body -->
  <rect x="96" y="172" width="320" height="220" rx="24" fill="rgba(255,255,255,0.15)" stroke="white" stroke-width="12"/>

  <!-- Envelope flap / M shape -->
  <path d="M108 196 L256 310 L404 196" fill="none" stroke="white" stroke-width="14" stroke-linecap="round" stroke-linejoin="round"/>

  <!-- Code brackets < > -->
  <path d="M170 118 L130 148 L170 178" fill="none" stroke="rgba(255,255,255,0.7)" stroke-width="12" stroke-linecap="round" stroke-linejoin="round"/>
  <path d="M342 118 L382 148 L342 178" fill="none" stroke="rgba(255,255,255,0.7)" stroke-width="12" stroke-linecap="round" stroke-linejoin="round"/>

  <!-- Slash between brackets -->
  <line x1="272" y1="112" x2="240" y2="184" stroke="rgba(255,255,255,0.5)" stroke-width="10" stroke-linecap="round"/>
</svg>
